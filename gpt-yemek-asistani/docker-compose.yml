services:
  n8n:
    image: n8nio/n8n:latest
    container_name: dinner_n8n
    ports:
      - "5678:5678"
    environment:
      - TZ=Europe/Istanbul
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_ENCRYPTION_KEY=change_this_to_a_long_random_string
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - WEBHOOK_URL=https://settlement-subjects-appreciation-calvin.trycloudflare.com
      - N8N_HOST=settlement-subjects-appreciation-calvin.trycloudflare.com
      - N8N_PROTOCOL=https

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: dinner_ollama
    gpus: all
    environment:
      - TZ=Europe/Istanbul
      
# GPU görünürlüğü için yardımcı env'ler (NVIDIA dokümantasyonu) 【2-199f74】
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Debug (GPU keşfini logdan görmek için) 【3-eb168f】
      - OLLAMA_DEBUG=1
      # PC kitlenmesini azaltmak için (konservatif ayarlar)
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1

# ✅ Telegram ENV (burayı ekle)
      - TELEGRAM_BOT_TOKEN=8779232468:AAEEnYBXUU_4X2etXw6R8tZ4GF0XmwcKLjk
      - TELEGRAM_CHAT_ID=-4929983051

    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"

volumes:
  n8n_data:
  ollama_data: