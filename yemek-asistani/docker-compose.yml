version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
# NVIDIA_VISIBLE_DEVICES: hangi GPU’ların görüneceğini belirler (all/0/1/uuid vs.) 【2-19d461】
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
# ✅ GPU rezervasyonu (Compose’ta GPU erişimi için önerilen yol) 【1-08e700】
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1        # bütün GPU’lar için: all
              capabilities: [gpu]


  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    volumes:
      - ./ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        sleep 5 &&
        ollama pull llama3.2:3b &&
        echo 'Model indirildi!'
      "
    restart: "no"

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Istanbul
      - TZ=Europe/Istanbul
      # Workflow verilerini kaydet
      - N8N_RUNNERS_ENABLED=true
    volumes:
      - ./n8n-data:/home/node/.n8n
    depends_on:
      - ollama
    links:
      - ollama

volumes:
  ollama-data:
  n8n-data:
